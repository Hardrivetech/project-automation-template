# GitHub Project (beta) Automation Workflow
# This workflow creates issues from a YAML roadmap file and adds them to a GitHub Projects (beta) board with status 'Backlog'.
# You may freely distribute and modify this workflow.

name: Project Automation

on:
  push:
    paths:
      - '.github/example-roadmap.yml'
  workflow_dispatch:

jobs:
  create-and-add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt
      - name: Run roadmap automation script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Use a token with project write access
          PROJECT_ID: ${{ secrets.PROJECT_ID }} # The ID of your GitHub Project (beta)
          STATUS_FIELD_ID: ${{ secrets.STATUS_FIELD_ID }} # The ID of the 'Status' field in your project
          BACKLOG_OPTION_ID: ${{ secrets.BACKLOG_OPTION_ID }} # The ID of the 'Backlog' option in your project
          GITHUB_REPOSITORY: ${{ github.repository }}
          ROADMAP_FILE: .github/example-roadmap.yml
        run: |
          python .github/scripts/roadmap_to_project.py