# GitHub Project (beta) Automation Workflow
# This workflow creates issues from a YAML roadmap file and adds them to a GitHub Projects (beta) board with status 'Backlog'.
# You may freely distribute and modify this workflow.

name: Project Automation

on:
  push:
    paths:
      - '.github/example-roadmap.yml'
  workflow_dispatch:

jobs:
  create-and-add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create issues from roadmap
        id: create_issues
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: ${{ github.event.head_commit.message || 'Automated Issue' }}
          content-filepath: .github/example-roadmap.yml
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add issues to GitHub Project (beta)
        if: steps.create_issues.outputs.issue-number
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Use a token with project write access
          PROJECT_ID: <YOUR_PROJECT_ID>
          STATUS_FIELD_ID: <YOUR_STATUS_FIELD_ID>
          BACKLOG_OPTION_ID: <YOUR_BACKLOG_OPTION_ID>
        run: |
          ISSUE_NUMBER=${{ steps.create_issues.outputs.issue-number }}
          # Get the node ID for the issue
          ISSUE_NODE_ID=$(gh api graphql -F number=$ISSUE_NUMBER -F owner=${{ github.repository_owner }} -F repo=${{ github.event.repository.name }} -f query='query($owner: String!, $repo: String!, $number: Int!) { repository(owner: $owner, name: $repo) { issue(number: $number) { id } } }' --jq '.data.repository.issue.id')
          # Add the issue to the project
          gh api graphql -f query='mutation($project:ID!,$item:ID!){addProjectV2ItemById(input:{projectId:$project,contentId:$item}){item{id}}}' -f project=$PROJECT_ID -f item=$ISSUE_NODE_ID
          # Set the status to Backlog
          ITEM_ID=$(gh api graphql -f query='query($project:ID!,$item:ID!){projectV2ItemById(projectId:$project,id:$item){id}}' -f project=$PROJECT_ID -f item=$ISSUE_NODE_ID --jq '.data.projectV2ItemById.id')
          gh api graphql -f query='mutation($item:ID!,$field:ID!,$option: String!){updateProjectV2ItemFieldValue(input:{projectId:"'$PROJECT_ID'", itemId:$item, fieldId:$field, value:{singleSelectOptionId:$option}}){projectV2Item{id}}}' -f item=$ITEM_ID -f field=$STATUS_FIELD_ID -f option=$BACKLOG_OPTION_ID
